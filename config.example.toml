seed = 12345

[repository]
path = "./synthetic-history-repo"
init = true
branch = "main"
remote = ""
push = false
allow_dirty = false

[identity]
name = "Synthetic Test Bot"
email = "synthetic-test@example.invalid"

[range]
start = "2010-01-01"
end = "2010-01-14"
timezone = "+01:00"
skip_weekends = false

[volume]
min_commits_per_day = 1
max_commits_per_day = 4
active_day_probability = 0.85
weekend_multiplier = 0.35

[time]
start = "08:15"
end = "18:45"

[content]
activity_file = "activity.log"
line_template = "{date} {time} synthetic event #{sequence}"
message_templates = [
  "Update integration fixture {date}",
  "Record synthetic activity {date} #{index}",
  "Refresh test dataset batch {sequence}",
  "Adjust generated fixture for {date}"
]
