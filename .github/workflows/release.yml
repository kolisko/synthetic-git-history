name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }} ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Test
        run: go test ./...
      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          name="synthgit-${GITHUB_REF_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}"
          output="dist/${name}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            output="${output}.exe"
          fi
          GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o "${output}" ./cmd/synthgit
          cd dist
          sha256sum "$(basename "${output}")" > "$(basename "${output}").sha256"
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
